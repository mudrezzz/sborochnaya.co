  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ---------- COLORS ---------- */\n  /* The system is a warm, paper-based neutral scale + one industrial signal.\n     Cool tones are deliberately absent — the brand reads \"workshop\", not \"SaaS\". */\n\n  /* Paper / surface */\n  --paper:        #EFECE6;  /* primary background, warm cream */\n  --paper-bright: #F6F3ED;  /* elevated surface (cards on paper) */\n  --paper-dim:    #E5E1D8;  /* recessed surface, dividers blocks */\n  --paper-edge:   #D6D1C4;  /* hairline borders on paper */\n\n  /* Ink / type */\n  --ink:          #16140F;  /* primary text, slightly warm near-black */\n  --ink-2:        #3A3730;  /* secondary text, captions */\n  --ink-3:        #6E6A5E;  /* tertiary, meta */\n  --ink-4:        #97927F;  /* disabled / hint */\n\n  /* Signal — single accent, used sparingly */\n  --signal:       #D84727;  /* primary signal, industrial red-orange */\n  --signal-press: #B23A1F;  /* darker press / hover-down */\n  --signal-soft:  #F1D9CE;  /* tinted bg for accent surfaces */\n\n  /* Plate — deep \"shop floor\" reverse surface */\n  --plate:        #1B1813;  /* dark inverted background */\n  --plate-2:      #2A2620;  /* elevated dark */\n  --plate-edge:   #3A3528;  /* dark hairline */\n  --plate-ink:    #EFECE6;  /* type on dark */\n  --plate-ink-2:  #B6B0A0;  /* secondary type on dark */\n\n  /* Status (used rarely; the brand prefers signal+neutral) */\n  --status-ok:    #3D6E47;\n  --status-warn:  #C28115;\n  --status-err:   #C13A23;\n\n  /* ---------- TYPE ---------- */\n  --font-display: 'Unbounded', 'Inter', system-ui, sans-serif;     /* big headlines, station IDs */\n  --font-body:    'Onest', 'Inter', system-ui, -apple-system, sans-serif; /* everything else */\n  --font-mono:    'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace; /* indices, tags, code */\n\n  /* Sizes — modular scale 1.25 from 16px base */\n  --t-12: 0.75rem;    /* 12 — micro labels, tags */\n  --t-14: 0.875rem;   /* 14 — caption */\n  --t-16: 1rem;       /* 16 — body */\n  --t-18: 1.125rem;   /* 18 — body large */\n  --t-22: 1.375rem;   /* 22 — h5 */\n  --t-28: 1.75rem;    /* 28 — h4 */\n  --t-36: 2.25rem;    /* 36 — h3 */\n  --t-48: 3rem;       /* 48 — h2 */\n  --t-64: 4rem;       /* 64 — h1 */\n  --t-96: 6rem;       /* 96 — display */\n  --t-128:8rem;       /* 128 — hero display */\n\n  --lh-tight:     1.05;\n  --lh-snug:      1.18;\n  --lh-normal:    1.45;\n  --lh-loose:     1.6;\n\n  --tracking-tight:  -0.02em;\n  --tracking-normal: 0;\n  --tracking-wide:    0.04em;\n  --tracking-mono:    0.06em;  /* used on uppercase mono labels */\n\n  /* ---------- SPACING ---------- */\n  /* 4-based scale */\n  --s-1:  4px;\n  --s-2:  8px;\n  --s-3:  12px;\n  --s-4:  16px;\n  --s-5:  24px;\n  --s-6:  32px;\n  --s-7:  48px;\n  --s-8:  64px;\n  --s-9:  96px;\n  --s-10: 128px;\n  --s-11: 192px;\n\n  /* ---------- RADII ---------- */\n  /* Restrained. The brand reads industrial — corners stay sharp or barely rounded. */\n  --r-0: 0;\n  --r-1: 2px;\n  --r-2: 4px;\n  --r-3: 8px;\n  --r-pill: 999px;\n\n  /* ---------- BORDERS ---------- */\n  --bw-hair: 1px;        /* default — hairline */\n  --bw-rule: 1.5px;      /* visual rule on dark */\n  --bw-thick: 2px;       /* emphasis */\n\n  /* ---------- SHADOWS ---------- */\n  /* Elevations are subtle. The system favors hairline borders + paper texture\n     over dropshadows. Only modal/overlay use noticeable shadow. */\n  --shadow-0: none;\n  --shadow-1: 0 1px 0 rgba(22, 20, 15, 0.04), 0 0 0 1px rgba(22, 20, 15, 0.06);\n  --shadow-2: 0 2px 8px -2px rgba(22, 20, 15, 0.08), 0 0 0 1px rgba(22, 20, 15, 0.06);\n  --shadow-3: 0 12px 32px -8px rgba(22, 20, 15, 0.18), 0 0 0 1px rgba(22, 20, 15, 0.08);\n  --shadow-inset: inset 0 0 0 1px rgba(22, 20, 15, 0.08);\n\n  /* ---------- MOTION ---------- */\n  --ease-out:    cubic-bezier(0.2, 0.7, 0.2, 1);\n  --ease-in-out: cubic-bezier(0.5, 0, 0.2, 1);\n  --ease-snap:   cubic-bezier(0.6, 0.0, 0.2, 1);   /* mechanical, snaps */\n  --dur-fast: 120ms;\n  --dur-base: 200ms;\n  --dur-slow: 360ms;\n\n  /* ---------- LAYOUT ---------- */\n  --max-w-prose: 64ch;\n  --max-w-page:  1280px;\n  --grid-gutter: 24px;\n}\n\n/* ============================================================\n   SEMANTIC ELEMENT STYLES\n   Default styling for raw HTML — drop a stylesheet, get the brand.\n   ============================================================ */\n\nhtml, body {\n  background: var(--paper);\n  color: var(--ink);\n  font-family: var(--font-body);\n  font-size: var(--t-16);\n  line-height: var(--lh-normal);\n  font-feature-settings: \"ss01\", \"cv11\";\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* Display + headings ------------------------------------------ */\n.display {\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: clamp(var(--t-64), 8vw, var(--t-128));\n  line-height: var(--lh-tight);\n  letter-spacing: var(--tracking-tight);\n  color: var(--ink);\n  margin: 0;\n}\n\nh1 {\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: var(--t-64);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--tracking-tight);\n  margin: 0 0 var(--s-5) 0;\n}\n\nh2 {\n  font-family: var(--font-display);\n  font-weight: 500;\n  font-size: var(--t-48);\n  line-height: var(--lh-snug);\n  letter-spacing: var(--tracking-tight);\n  margin: 0 0 var(--s-5) 0;\n}\n\nh3 {\n  font-family: var(--font-body);\n  font-weight: 600;\n  font-size: var(--t-36);\n  line-height: var(--lh-snug);\n  letter-spacing: var(--tracking-tight);\n  margin: 0 0 var(--s-4) 0;\n}\n\nh4 {\n  font-family: var(--font-body);\n  font-weight: 600;\n  font-size: var(--t-28);\n  line-height: var(--lh-snug);\n  margin: 0 0 var(--s-4) 0;\n}\n\nh5 {\n  font-family: var(--font-body);\n  font-weight: 600;\n  font-size: var(--t-22);\n  line-height: var(--lh-snug);\n  margin: 0 0 var(--s-3) 0;\n}\n\nh6, .eyebrow {\n  font-family: var(--font-mono);\n  font-weight: 500;\n  font-size: var(--t-12);\n  line-height: var(--lh-normal);\n  letter-spacing: var(--tracking-mono);\n  text-transform: uppercase;\n  color: var(--ink-3);\n  margin: 0 0 var(--s-3) 0;\n}\n\np {\n  font-size: var(--t-16);\n  line-height: var(--lh-normal);\n  color: var(--ink-2);\n  margin: 0 0 var(--s-4) 0;\n  text-wrap: pretty;\n}\n\np.lead {\n  font-size: var(--t-22);\n  line-height: var(--lh-snug);\n  color: var(--ink);\n  font-weight: 400;\n}\n\nsmall, .caption {\n  font-size: var(--t-14);\n  color: var(--ink-3);\n  line-height: var(--lh-normal);\n}\n\na {\n  color: var(--ink);\n  text-decoration: underline;\n  text-decoration-thickness: 1px;\n  text-underline-offset: 3px;\n  text-decoration-color: var(--paper-edge);\n  transition: text-decoration-color var(--dur-fast) var(--ease-out), color var(--dur-fast) var(--ease-out);\n}\na:hover {\n  text-decoration-color: var(--signal);\n  color: var(--signal);\n}\n\n/* Mono / index / tags ---------------------------------------- */\ncode, kbd, samp, .mono {\n  font-family: var(--font-mono);\n  font-size: 0.92em;\n  letter-spacing: var(--tracking-mono);\n}\n\n.tag {\n  display: inline-flex;\n  align-items: center;\n  gap: var(--s-2);\n  font-family: var(--font-mono);\n  font-size: var(--t-12);\n  font-weight: 500;\n  letter-spacing: var(--tracking-mono);\n  text-transform: uppercase;\n  color: var(--ink-2);\n  background: transparent;\n  border: var(--bw-hair) solid var(--paper-edge);\n  padding: 4px 8px;\n  border-radius: var(--r-1);\n}\n\n.tag--signal {\n  color: var(--signal);\n  border-color: currentColor;\n}\n\n.tag--solid {\n  background: var(--ink);\n  color: var(--paper);\n  border-color: var(--ink);\n}\n\n/* Index / station number — assembly-floor motif ---------------- */\n.index {\n  font-family: var(--font-mono);\n  font-size: var(--t-12);\n  font-weight: 500;\n  letter-spacing: var(--tracking-mono);\n  text-transform: uppercase;\n  color: var(--ink-3);\n}\n\n/* Hairline rules and brackets -------------------------------- */\nhr, .rule {\n  border: 0;\n  height: var(--bw-hair);\n  background: var(--paper-edge);\n  margin: var(--s-5) 0;\n}\n\n.rule--ink { background: var(--ink); height: var(--bw-rule); }\n\n/* Selection */\n::selection { background: var(--signal); color: var(--paper); }\n\n/* Focus */\n:focus-visible {\n  outline: 2px solid var(--signal);\n  outline-offset: 2px;\n}\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body { background: var(--paper); color: var(--ink); }\n\n  /* Page shell */\n  .page { max-width: 1240px; margin: 0 auto; padding: 0 32px; }\n\n  /* ---------- Header ---------- */\n  .site-header {\n    position: sticky; top: 0; z-index: 50;\n    background: rgba(239, 236, 230, 0.94);\n    border-bottom: 1px solid var(--paper-edge);\n  }\n  .header-inner {\n    display: grid; grid-template-columns: auto 1fr auto;\n    align-items: center; gap: 24px;\n    padding: 14px 32px;\n  }\n  .lockup { display: inline-flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }\n  .lockup svg { width: 28px; height: 28px; }\n  .lockup .word {\n    font-family: var(--font-display); font-weight: 600;\n    font-size: 20px; letter-spacing: -0.02em; line-height: 1;\n  }\n  .lockup .word i { color: var(--signal); font-style: normal; }\n  .nav { display: flex; gap: 28px; justify-self: center; }\n  .nav-link {\n    font-family: var(--font-body); font-size: 14px; color: var(--ink);\n    text-decoration: none; display: inline-flex; align-items: baseline; gap: 8px;\n    transition: color 120ms;\n  }\n  .nav-link small {\n    font-family: var(--font-mono); font-size: 10px; color: var(--ink-3);\n    letter-spacing: 0.1em;\n  }\n  .nav-link:hover { color: var(--signal); }\n  .nav-link:hover small { color: var(--signal); }\n\n  /* ---------- Buttons ---------- */\n  .btn {\n    display: inline-flex; align-items: center; gap: 10px;\n    font-family: var(--font-body); font-weight: 500; font-size: 15px;\n    border: 1.5px solid var(--ink); background: var(--ink); color: var(--paper);\n    padding: 11px 18px; border-radius: 2px; cursor: pointer;\n    transition: background 120ms, color 120ms, border-color 120ms, transform 120ms;\n    text-decoration: none; letter-spacing: -0.005em;\n  }\n  .btn:hover { background: var(--signal); border-color: var(--signal); }\n  .btn:active { transform: translateY(1px); }\n  .btn .arr { font-family: var(--font-mono); }\n  .btn--ghost { background: transparent; color: var(--ink); }\n  .btn--ghost:hover { background: var(--ink); color: var(--paper); }\n\n  /* ---------- Hero ---------- */\n  .hero {\n    background: var(--plate); color: var(--plate-ink);\n    position: relative; overflow: hidden;\n    padding: 88px 0 72px;\n    background-image:\n      linear-gradient(to right, rgba(239,236,230,0.05) 1px, transparent 1px),\n      linear-gradient(to bottom, rgba(239,236,230,0.05) 1px, transparent 1px);\n    background-size: 56px 56px, 56px 56px;\n    background-color: var(--plate);\n  }\n  .regmark { position: absolute; width: 14px; height: 14px; pointer-events: none; }\n  .regmark::before, .regmark::after { content: \"\"; position: absolute; background: var(--signal); }\n  .regmark::before { left: 50%; top: 0; bottom: 0; width: 1px; transform: translateX(-50%); }\n  .regmark::after  { top: 50%; left: 0; right: 0; height: 1px; transform: translateY(-50%); }\n  .regmark--tl { top: 18px; left: 18px; }\n  .regmark--tr { top: 18px; right: 18px; }\n  .regmark--bl { bottom: 18px; left: 18px; }\n  .regmark--br { bottom: 18px; right: 18px; }\n\n  .hero-meta {\n    display: flex; justify-content: space-between; align-items: center;\n    font-family: var(--font-mono); font-size: 11px;\n    letter-spacing: 0.1em; text-transform: uppercase;\n    color: var(--plate-ink-2); margin-bottom: 56px;\n  }\n  .hero-meta .tag-signal {\n    border: 1px solid var(--signal); color: var(--signal);\n    padding: 5px 9px; border-radius: 2px;\n  }\n\n  .hero-title {\n    font-family: var(--font-display); font-weight: 600;\n    font-size: clamp(48px, 6.4vw, 88px);\n    line-height: 0.98; letter-spacing: -0.03em;\n    color: var(--plate-ink); margin: 0;\n    max-width: 18ch;\n  }\n  .hero-title .signal { color: var(--signal); }\n  .hero-title .light { font-weight: 400; color: var(--plate-ink-2); }\n\n  .hero-lead {\n    font-family: var(--font-body); font-size: 19px; line-height: 1.5;\n    color: var(--plate-ink-2); max-width: 56ch;\n    margin: 32px 0 40px;\n  }\n\n  .hero-cta { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }\n  .hero .btn { background: var(--signal); border-color: var(--signal); color: var(--paper); }\n  .hero .btn:hover { background: var(--signal-press); border-color: var(--signal-press); }\n  .hero .btn--ghost { background: transparent; color: var(--plate-ink); border-color: var(--plate-ink); }\n  .hero .btn--ghost:hover { background: var(--plate-ink); color: var(--plate); }\n\n  .hero-foot {\n    margin-top: 64px; padding-top: 24px;\n    border-top: 1px solid var(--plate-edge);\n    display: flex; gap: 40px; align-items: baseline; flex-wrap: wrap;\n    font-family: var(--font-mono); font-size: 11px;\n    letter-spacing: 0.08em; text-transform: uppercase;\n    color: var(--plate-ink-2);\n  }\n  .hero-foot b {\n    color: var(--plate-ink); font-family: var(--font-display);\n    font-weight: 600; font-size: 14px; margin-right: 8px;\n  }\n\n  /* ---------- Stations ---------- */\n  .section { padding: 96px 0; border-top: 1px solid var(--paper-edge); position: relative; }\n  .rule-row {\n    display: flex; align-items: center; gap: 16px;\n    font-family: var(--font-mono); font-size: 11px;\n    letter-spacing: 0.08em; text-transform: uppercase;\n    color: var(--ink-3); margin-bottom: 32px;\n  }\n  .rule-row::after { content: \"\"; flex: 1; height: 1px; background: var(--paper-edge); }\n\n  .section-head {\n    display: grid; grid-template-columns: 1.3fr 1fr; gap: 56px;\n    align-items: end; margin-bottom: 56px;\n  }\n  .h-section {\n    font-family: var(--font-display); font-weight: 500;\n    font-size: clamp(34px, 4vw, 52px); line-height: 1.04;\n    letter-spacing: -0.02em; margin: 0;\n  }\n  .h-section .signal { color: var(--signal); }\n  .section-head p {\n    font-family: var(--font-body); font-size: 18px; line-height: 1.5;\n    color: var(--ink-2); margin: 0; max-width: 44ch;\n  }\n\n  .stations-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }\n  .station-card {\n    background: var(--paper-bright); border: 1px solid var(--paper-edge);\n    padding: 24px; position: relative;\n    display: flex; flex-direction: column; gap: 14px;\n    min-height: 280px;\n    transition: border-color 160ms;\n  }\n  .station-card:hover { border-color: var(--ink); }\n  .station-card .corner {\n    position: absolute; top: 14px; right: 16px;\n    font-family: var(--font-mono); font-size: 11px;\n    letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-4);\n  }\n  .station-card .id {\n    font-family: var(--font-display); font-weight: 600; font-size: 52px;\n    line-height: 1; color: var(--signal); letter-spacing: -0.03em;\n  }\n  .station-card h3 {\n    font-family: var(--font-body); font-weight: 600; font-size: 20px;\n    margin: 0; line-height: 1.18; letter-spacing: -0.01em; color: var(--ink);\n  }\n  .station-card p {\n    font-size: 14.5px; line-height: 1.5; color: var(--ink-2); margin: 0;\n  }\n  .station-card .result {\n    margin-top: auto; padding-top: 14px;\n    border-top: 1px solid var(--paper-edge);\n    font-family: var(--font-mono); font-size: 11px;\n    letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-3);\n  }\n  .station-card .result b { color: var(--ink); font-weight: 600; }\n\n  .station-card.dark {\n    background: var(--plate-2); border-color: var(--plate-edge); color: var(--plate-ink);\n  }\n  .station-card.dark h3 { color: var(--plate-ink); }\n  .station-card.dark p { color: var(--plate-ink-2); }\n  .station-card.dark .corner { color: var(--plate-ink-2); opacity: 0.6; }\n  .station-card.dark .result { color: var(--plate-ink-2); border-top-color: var(--plate-edge); }\n  .station-card.dark .result b { color: var(--plate-ink); }\n  .station-card.dark:hover { border-color: var(--plate-ink-2); }\n\n  /* ---------- Manifest strip ---------- */\n  .manifest {\n    background: var(--paper-dim);\n    border-top: 1px solid var(--paper-edge);\n    border-bottom: 1px solid var(--paper-edge);\n    padding: 72px 0;\n  }\n  .manifest-grid {\n    display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px;\n  }\n  .manifest-item {\n    display: flex; flex-direction: column; gap: 10px;\n    padding-top: 18px; border-top: 1.5px solid var(--ink);\n  }\n  .manifest-item .neg {\n    font-family: var(--font-mono); font-size: 11px;\n    letter-spacing: 0.08em; text-transform: uppercase;\n    color: var(--signal);\n  }\n  .manifest-item .pos {\n    font-family: var(--font-body); font-size: 16px; line-height: 1.45;\n    color: var(--ink);\n  }\n  .manifest-item .pos b { font-weight: 600; }\n\n  /* ---------- CTA ---------- */\n  .cta {\n    background: var(--plate); color: var(--plate-ink);\n    padding: 96px 0; position: relative;\n  }\n  .cta-grid {\n    display: grid; grid-template-columns: 1.2fr 1fr; gap: 64px;\n    align-items: end;\n  }\n  .cta h2 {\n    font-family: var(--font-display); font-weight: 500;\n    font-size: clamp(36px, 4.4vw, 56px); line-height: 1.02;\n    letter-spacing: -0.02em; color: var(--plate-ink); margin: 0;\n  }\n  .cta h2 .signal { color: var(--signal); }\n  .cta-side {\n    display: flex; flex-direction: column; gap: 24px;\n    padding: 24px; border: 1px solid var(--plate-edge);\n    background: var(--plate-2);\n  }\n  .cta-side .label {\n    font-family: var(--font-mono); font-size: 11px;\n    letter-spacing: 0.1em; text-transform: uppercase; color: var(--plate-ink-2);\n  }\n  .cta-side .value {\n    font-family: var(--font-body); font-size: 16px; color: var(--plate-ink);\n    text-decoration: none; border-bottom: 1px solid var(--plate-edge);\n    padding-bottom: 10px;\n  }\n  .cta-side .value:hover { color: var(--signal); border-bottom-color: var(--signal); }\n  .cta-side .row {\n    display: flex; flex-direction: column; gap: 6px;\n  }\n  .cta .btn { background: var(--signal); border-color: var(--signal); color: var(--paper); }\n  .cta .btn:hover { background: var(--signal-press); border-color: var(--signal-press); }\n\n  /* ---------- Footer ---------- */\n  .footer {\n    background: var(--paper); padding: 32px 0; border-top: 1px solid var(--paper-edge);\n    font-family: var(--font-mono); font-size: 11px;\n    letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-3);\n  }\n  .footer-inner { display: flex; justify-content: space-between; align-items: center; gap: 24px; flex-wrap: wrap; }\n  .footer a { color: var(--ink-3); text-decoration: none; }\n  .footer a:hover { color: var(--signal); }\n\n  /* ---------- Responsive ---------- */\n  @media (max-width: 1024px) {\n    .stations-grid { grid-template-columns: repeat(2, 1fr); }\n    .manifest-grid { grid-template-columns: repeat(2, 1fr); }\n    .section-head { grid-template-columns: 1fr; gap: 24px; }\n    .cta-grid { grid-template-columns: 1fr; gap: 40px; }\n    .nav { display: none; }\n    .header-inner { grid-template-columns: 1fr auto; }\n  }\n  @media (max-width: 640px) {\n    .stations-grid, .manifest-grid { grid-template-columns: 1fr; }\n    .hero-meta { flex-direction: column; align-items: flex-start; gap: 12px; }\n    .footer-inner { flex-direction: column; align-items: flex-start; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<header class=\"site-header\" data-screen-label=\"00 Header\">\n  <div class=\"header-inner\">\n    <a class=\"lockup\" href=\"#top\" aria-label=\"Сборочная — на главную\">\n      <svg viewBox=\"0 0 64 64\" fill=\"none\">\n        <rect x=\"1\" y=\"1\" width=\"62\" height=\"62\" stroke=\"#16140F\" stroke-width=\"2\" fill=\"none\"><\u002Frect>\n        <path d=\"M50 10L18 10L18 54L50 54\" stroke=\"#16140F\" stroke-width=\"6\" fill=\"none\" stroke-linecap=\"square\"><\u002Fpath>\n        <path d=\"M30 32L50 32\" stroke=\"#D84727\" stroke-width=\"6\" stroke-linecap=\"square\"><\u002Fpath>\n      <\u002Fsvg>\n      <span class=\"word\">Сборочная<i>.<\u002Fi><\u002Fspan>\n    <\u002Fa>\n    <nav class=\"nav\">\n      <a class=\"nav-link\" href=\"#stations\"><small>01<\u002Fsmall> Линейка<\u002Fa>\n      <a class=\"nav-link\" href=\"#manifest\"><small>02<\u002Fsmall> Подход<\u002Fa>\n      <a class=\"nav-link\" href=\"#contact\"><small>03<\u002Fsmall> Контакт<\u002Fa>\n    <\u002Fnav>\n    <a class=\"btn\" href=\"#contact\">Запросить диагностику <span class=\"arr\">→<\u002Fspan><\u002Fa>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<section class=\"hero\" id=\"top\" data-screen-label=\"01 Hero\">\n  <span class=\"regmark regmark--tl\"><\u002Fspan>\n  <span class=\"regmark regmark--tr\"><\u002Fspan>\n  <span class=\"regmark regmark--bl\"><\u002Fspan>\n  <span class=\"regmark regmark--br\"><\u002Fspan>\n\n  <div class=\"page\">\n    <div class=\"hero-meta\">\n      <span class=\"tag-signal\">СБОРОЧНАЯ · AI-ПЕРЕСБОРКА B2B<\u002Fspan>\n      <span>53.9°N 27.5°E · v.2026<\u002Fspan>\n    <\u002Fdiv>\n\n    <h1 class=\"hero-title\">\n      AI-пересборка<br>\n      сложных <span class=\"signal\">B2B-продуктов<\u002Fspan><br>\n      <span class=\"light\">без лишних слоёв.<\u002Fspan>\n    <\u002Fh1>\n\n    <p class=\"hero-lead\">\n      Мы&nbsp;работаем с&nbsp;технологическими командами, у&nbsp;которых сильный продукт,\n      но&nbsp;рост тормозится из-за сложной упаковки, длинных продаж или&nbsp;тяжёлого внедрения.\n      Находим, где теряется движение, и&nbsp;собираем рынок, продажи и&nbsp;внедрение заново.\n    <\u002Fp>\n\n    <div class=\"hero-cta\">\n      <a class=\"btn\" href=\"#contact\">Запустить диагностику 002Fspan>\n      <\u002Fdiv>\n      <div class=\"manifest-item\">\n        <span class=\"neg\">— Не sales-аудит<\u002Fspan>\n        <span class=\"pos\">Смотрим не&nbsp;только на&nbsp;воронку, а&nbsp;на&nbsp;<b>продукт, рынок, коммуникации и&nbsp;внедрение<\u002Fb> как одну систему.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"cta\" id=\"contact\" data-screen-label=\"04 Contact\">\n  <span class=\"regmark regmark--tl\"><\u002Fspan>\n  <span class=\"regmark regmark--tr\"><\u002Fspan>\n  <div class=\"page cta-grid\">\n    <div>\n      <div class=\"rule-row\" style=\"color: var(--plate-ink-2); margin-bottom: 24px;\">\n        <span style=\"color: var(--plate-ink-2);\">— Запрос на диагностику<\u002Fspan>\n      <\u002Fdiv>\n      <h2>\n        Две&nbsp;недели.<br>\n        Карта точек трения.<br>\n        <span class=\"signal\">Без обязательств дальше.<\u002Fspan>\n      <\u002Fh2>\n      <p style=\"font-family: var(--font-body); font-size: 18px; line-height: 1.5; color: var(--plate-ink-2); margin: 28px 0 32px; max-width: 48ch;\">\n        Расскажите, где у&nbsp;вас тормозится движение — вернёмся со&nbsp;структурой работы\n        и&nbsp;примером похожего кейса в&nbsp;течение двух рабочих дней.\n      <\u002Fp>\n      <a class=\"btn\" href=\"mailto:hello@sborochnaya.ru\">Написать на&nbsp;hello@sborochnaya.ru <span class=\"arr\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n\n    <aside class=\"cta-side\">\n      <div class=\"row\">\n        <span class=\"label\">— Почта<\u002Fspan>\n        <a class=\"value\" href=\"mailto:hello@sborochnaya.ru\">hello@sborochnaya.ru<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <span class=\"label\">— Telegram<\u002Fspan>\n        <a class=\"value\" href=\"#\">@sborochnaya<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <span class=\"label\">— Календарь<\u002Fspan>\n        <a class=\"value\" href=\"#\">Звонок · 30&nbsp;мин<\u002Fa>\n      <\u002Fdiv>\n
